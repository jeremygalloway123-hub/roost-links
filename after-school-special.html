<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>After School Special</title>
  <meta name="description" content="After School Special — official links. Listen, follow, and support the band." />

  <!-- Open Graph -->
  <meta property="og:title" content="After School Special" />
  <meta property="og:description" content="Listen, follow, and support After School Special." />
  <meta property="og:type" content="website" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #0a0a0b;
      --bg-soft: #141416;
      --card: #18181b;
      --card-hover: #232327;
      --border: #2a2a2e;
      --text: #f4f4f5;
      --text-dim: #8a8a92;
      --accent: #ffffff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 20px 64px;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
      position: relative;
      overflow-x: hidden;
    }

    /* Subtle ambient glow */
    body::before {
      content: "";
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 480px;
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Header */
    .logo {
      width: min(360px, 80vw);
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      filter: drop-shadow(0 16px 50px rgba(0,0,0,0.6));
    }

    .logo img {
      width: 100%;
      height: auto;
      object-fit: contain;
      display: block;
    }

    .tagline {
      color: var(--text-dim);
      font-size: 0.9rem;
      letter-spacing: 1px;
      margin-bottom: 40px;
      text-transform: uppercase;
      font-weight: 500;
    }

    /* Links */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 16px 20px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      text-decoration: none;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: 0.3px;
      transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
      position: relative;
    }

    .link:hover {
      background: var(--card-hover);
      border-color: #3a3a40;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.45);
    }

    .link:active { transform: translateY(0); }

    .link .icon {
      flex: 0 0 24px;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .link .icon img,
    .link .icon svg {
      width: 24px;
      height: 24px;
      display: block;
    }

    .link .label { flex: 1; }

    .link .arrow {
      color: var(--text-dim);
      font-size: 1rem;
      transition: transform 0.18s ease, color 0.18s ease;
    }

    .link:hover .arrow {
      color: var(--text);
      transform: translateX(3px);
    }

    /* Footer */
    footer {
      margin-top: 48px;
      color: var(--text-dim);
      font-size: 0.78rem;
      letter-spacing: 1px;
      text-align: center;
    }

    @media (max-width: 420px) {
      body { padding-top: 28px; }
      .logo { margin-bottom: 14px; }
      .tagline { margin-bottom: 26px; }
      .link { padding: 15px 18px; font-size: 0.95rem; }
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="logo"><img src="assets/ass-logo-white.png" alt="After School Special logo" /></div>
    <p class="tagline">Listen · Follow · Support</p>

    <nav class="links">
      <a class="link" href="https://venmo.com/u/Jeremy-Galloway-1" target="_blank" rel="noopener noreferrer">
        <span class="icon"><img src="https://cdn.simpleicons.org/venmo/ffffff" alt="Venmo" loading="lazy" /></span>
        <span class="label">Tip us on Venmo</span>
        <span class="arrow">&rarr;</span>
      </a>

      <a class="link" href="https://www.instagram.com/hash_ironfist/" target="_blank" rel="noopener noreferrer">
        <span class="icon"><img src="https://cdn.simpleicons.org/instagram/ffffff" alt="Instagram" loading="lazy" /></span>
        <span class="label">Jeremy Galloway on IG</span>
        <span class="arrow">&rarr;</span>
      </a>

      <a class="link" href="https://www.jeremygallowaymusic.com/" target="_blank" rel="noopener noreferrer">
        <span class="icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-label="Website" role="img">
            <circle cx="12" cy="12" r="10" />
            <line x1="2" y1="12" x2="22" y2="12" />
            <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z" />
          </svg>
        </span>
        <span class="label">JeremyGallowayMusic.com</span>
        <span class="arrow">&rarr;</span>
      </a>

      <a class="link" href="https://www.instagram.com/doownave/?hl=en" target="_blank" rel="noopener noreferrer">
        <span class="icon"><img src="https://cdn.simpleicons.org/instagram/ffffff" alt="Instagram" loading="lazy" /></span>
        <span class="label">Evan Wood on IG</span>
        <span class="arrow">&rarr;</span>
      </a>

      <a class="link" href="https://www.instagram.com/timweisman/" target="_blank" rel="noopener noreferrer">
        <span class="icon"><img src="https://cdn.simpleicons.org/instagram/ffffff" alt="Instagram" loading="lazy" /></span>
        <span class="label">Tim Weisman on IG</span>
        <span class="arrow">&rarr;</span>
      </a>

      <a class="link" href="https://www.instagram.com/afterschoolspecialmusic/" target="_blank" rel="noopener noreferrer">
        <span class="icon"><img src="https://cdn.simpleicons.org/instagram/ffffff" alt="Instagram" loading="lazy" /></span>
        <span class="label">After School Special on IG</span>
        <span class="arrow">&rarr;</span>
      </a>
    </nav>

    <footer>&copy; <span id="year"></span> After School Special</footer>
  </main>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
